<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gold Tracker Pro - Stable Version</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f1f5f9;
            --card: #ffffff;
            --border: #e2e8f0;
            --danger: #ef4444;
            --dark-badge: #334155;
            --price-blue: #4338ca;
            --highlight-gold: #fefce8; /* Light yellow for input warning */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); padding: 10px; padding-bottom: 60px; }
        .container { max-width: 700px; margin: 0 auto; background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        /* PRINT STYLES */
        #printHeader { display: none; }
        @media print {
            .quick-add, .btn-action, #bulkBar, details, .checkbox-ui, .edit-drawer, .header, .btn-photo, #recordsList { display: none !important; }
            #printHeader { display: block; }
            .container { box-shadow: none; padding: 0; max-width: 100%; border-radius: 0; }
            body { background: white; padding: 0; }
            .receipt-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
            .receipt-table th { background: #f8fafc; border-bottom: 2px solid #000; text-align: left; padding: 10px; font-size: 0.8rem; text-transform: uppercase; }
            .receipt-table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; vertical-align: middle; }
            .receipt-img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #eee; }
            .sig-section { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; margin-top: 60px; }
            .sig-box { border-top: 1px solid #000; padding-top: 8px; font-size: 0.75rem; font-weight: bold; text-align: center; }
        }

        .header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .spot-badge { background: #eef2ff; color: var(--primary); padding: 5px 12px; border-radius: 50px; font-weight: 700; font-size: 0.8rem; }
        
        .totals-banner { 
            background: var(--primary); 
            color: white; 
            padding: 15px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 20px; 
        }
        .total-val { font-size: 1.3rem; font-weight: 900; }

        .grid-settings { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px; 
            margin-top: 10px; 
        }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; }
        input, select, textarea { padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; width: 100%; font-weight: 600; outline: none; transition: background 0.2s; }
        
        /* UNIT HIGHLIGHT FOR THE INPUT FIELD */
        .input-warning { background-color: var(--highlight-gold) !important; border-color: #fcd34d !important; }

        .quick-add { background: #eff6ff; padding: 12px; border-radius: 12px; display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; margin-bottom: 20px; border: 1px solid #bfdbfe; }
        .btn-add { background: #10b981; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        .item-card { border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 12px; background: white; transition: border 0.2s; }
        .item-card.editing { border: 2px solid var(--primary); background: #fafafa; }
        .card-view { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card-left { display: flex; align-items: center; gap: 12px; }
        .item-price { color: var(--price-blue); font-size: 1.2rem; font-weight: 900; }
        
        .thumb-preview { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; background: #f1f5f9; }
        .edit-drawer { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .item-card.editing .edit-drawer { display: block; }
        .btn-photo { background: #6366f1; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; cursor: pointer; }
        .btn-action { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; }
        
        @media (max-width: 500px) {
            .quick-add { grid-template-columns: 1fr 1fr; }
            .btn-add { grid-column: span 2; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="printHeader">
        <div style="display: flex; justify-content: space-between; border-bottom: 3px solid #000; padding-bottom: 15px; margin-bottom: 20px;">
            <div><h1>GOLD RECEIPT</h1><p>Date: <span id="pDate"></span></p></div>
            <div style="text-align: right;"><h3 id="pBuyer">Business Name</h3></div>
        </div>
        <table class="receipt-table">
            <thead><tr><th>Photo</th><th>Item</th><th>Weight</th><th>Purity</th><th style="text-align: right;">Amount</th></tr></thead>
            <tbody id="pItemsBody"></tbody>
            <tfoot><tr><td colspan="4" style="text-align: right; font-weight: 800;">TOTAL SETTLEMENT:</td><td id="pTotalPrint" style="text-align: right; font-weight: 900;"></td></tr></tfoot>
        </table>
    </div>

    <div class="header">
        <h2>Gold Tracker</h2>
        <div class="spot-badge" id="livePrice">Spot: $...</div>
    </div>

    <details open>
        <summary style="cursor:pointer; font-size: 0.7rem; font-weight: 700; color: var(--primary); margin-bottom: 10px;">TRANSACTION SETTINGS</summary>
        <div class="grid-settings">
            <div class="input-group"><label>Date</label><input type="date" id="docDate" oninput="syncHeader()"></div>
            <div class="input-group"><label>Seller</label><input type="text" id="seller" placeholder="Customer Name" oninput="syncHeader()"></div>
            <div class="input-group"><label>Spot Price</label><input type="number" id="spotPrice" oninput="recalc()"></div>
            <div class="input-group"><label>% of Spot</label><input type="number" id="percent" value="90" oninput="recalc()"></div>
            <div class="input-group"><label>Unit Type</label>
                <select id="unit" onchange="recalc()">
                    <option value="grams">Grams (g)</option>
                    <option value="dwt">Pennyweight (dwt)</option>
                    <option value="ozt">Troy Ounces (ozt)</option>
                </select>
            </div>
            <div class="input-group"><label>Buyer</label><input type="text" id="buyer" placeholder="Store Name" oninput="syncHeader()"></div>
        </div>
    </details>

    <div class="totals-banner" id="banner">
        <div>Total: <span id="totalW">0.00</span> <span id="uLabel">g</span></div>
        <div id="totalC" class="total-val">$0.00</div>
    </div>

    <div class="quick-add">
        <div class="input-group">
            <label>Weight</label>
            <input type="number" id="qWeight" placeholder="0.00">
        </div>
        <div class="input-group">
            <label>Karat</label>
            <select id="qKarat" onchange="syncPurity('qKarat', 'qPurity')">
                <option value="10" selected>10K</option><option value="14">14K</option><option value="18">18K</option><option value="22">22K</option><option value="24">24K</option><option value="custom">Custom</option>
            </select>
        </div>
        <div class="input-group"><label>Purity %</label><input type="number" id="qPurity" value="41.67" disabled></div>
        <button class="btn-add" onclick="addNew()">ADD</button>
    </div>

    <div id="recordsList"></div>

    <button class="btn-action" style="background:#f59e0b; color:white;" onclick="window.print()">🖨️ Print Receipt</button>
    <button class="btn-action" style="background:#ef4444; color:white;" onclick="resetApp()">🔄 Clear All</button>
</div>

<script>
    let records = [];
    const karatMap = { 10: 41.67, 14: 58.33, 18: 75.0, 22: 91.67, 24: 99.99 };

    async function fetchSpot() {
        try {
            const r = await fetch('https://api.metals.dev/v1/latest?api_key=SDLIO6XALG4MJ66HNTWF1196HNTWF&currency=USD&unit=toz');
            const d = await r.json();
            if(d && d.metals && d.metals.gold) {
                const val = d.metals.gold;
                document.getElementById('livePrice').innerText = `Spot: $${val.toFixed(2)}`;
                if(!document.getElementById('spotPrice').value) {
                    document.getElementById('spotPrice').value = val.toFixed(2);
                }
                recalc();
            }
        } catch(e) { document.getElementById('livePrice').innerText = "Spot: Check API"; }
    }

    function syncPurity(kId, pId) {
        const kSelect = document.getElementById(kId);
        const pInput = document.getElementById(pId);
        if(kSelect.value !== 'custom') {
            pInput.value = karatMap[kSelect.value];
            pInput.disabled = true;
        } else { pInput.disabled = false; }
    }

    function syncHeader() {
        document.getElementById('pDate').innerText = document.getElementById('docDate').value;
        document.getElementById('pBuyer').innerText = document.getElementById('buyer').value || 'Business Name';
    }

    function updateRecSilent(id, field, value) {
        const rec = records.find(r => r.id === id);
        rec[field] = (field === 'notes') ? value : parseFloat(value);
        recalc();
    }

    function toggleEdit(id) {
        records.forEach(r => r.isEditing = (r.id === id ? !r.isEditing : false));
        recalc();
    }

    function handleImage(id, input) {
        const reader = new FileReader();
        reader.onload = (e) => { records.find(r => r.id === id).img = e.target.result; recalc(); };
        if(input.files[0]) reader.readAsDataURL(input.files[0]);
    }

    function recalc() {
        const spot = parseFloat(document.getElementById('spotPrice').value) || 0;
        const pct = parseFloat(document.getElementById('percent').value) / 100 || 0;
        const unit = document.getElementById('unit').value;
        const list = document.getElementById('recordsList');
        const unitLabel = document.getElementById('uLabel');
        const weightInput = document.getElementById('qWeight');
        
        const isGram = unit === 'grams';
        unitLabel.innerText = unit === 'ozt' ? 'ozt' : (unit === 'dwt' ? 'dwt' : 'g');
        
        // Highlight logic only on the WEIGHT INPUT field
        if(!isGram) {
            weightInput.classList.add('input-warning');
        } else {
            weightInput.classList.remove('input-warning');
        }

        list.innerHTML = '';
        let tW = 0, tC = 0;
        const printBody = document.getElementById('pItemsBody');
        printBody.innerHTML = '';

        records.forEach(rec => {
            let conv = unit === 'dwt' ? 20 : 31.1035;
            let price = (unit === 'ozt') ? (rec.weight * (rec.purity/100) * spot * pct) 
                                         : (rec.weight / conv) * (rec.purity / 100) * spot * pct;
            
            tW += rec.weight; tC += price;

            const div = document.createElement('div');
            div.className = `item-card ${rec.isEditing ? 'editing' : ''}`;
            div.innerHTML = `<div class="card-view" onclick="toggleEdit(${rec.id})">
                <div class="card-left">
                    <div class="karat-badge" style="background:var(--dark-badge);color:white;padding:5px;border-radius:5px;font-size:0.8rem;font-weight:800;">${rec.karat}</div>
                    ${rec.img ? `<img src="${rec.img}" class="thumb-preview">` : ''}
                    <span style="font-weight:700;">${rec.weight}${unitLabel.innerText}</span>
                </div>
                <div class="item-price">$${price.toFixed(2)}</div>
            </div>
            <div class="edit-drawer" onclick="event.stopPropagation()">
                <div class="grid-settings">
                    <div class="input-group"><label>Weight</label><input type="number" step="0.01" value="${rec.weight}" oninput="updateRecSilent(${rec.id}, 'weight', this.value)"></div>
                    <div class="input-group"><label>Photo</label><button class="btn-photo" onclick="document.getElementById('img-${rec.id}').click()">Photo</button></div>
                </div>
                <input type="file" id="img-${rec.id}" style="display:none" accept="image/*" onchange="handleImage(${rec.id}, this)">
                <textarea style="margin-top:10px" placeholder="Notes..." oninput="updateRecSilent(${rec.id}, 'notes', this.value)">${rec.notes || ''}</textarea>
            </div>`;
            list.appendChild(div);

            printBody.innerHTML += `<tr>
                <td>${rec.img ? `<img src="${rec.img}" class="receipt-img">` : 'No Photo'}</td>
                <td>${rec.karat} Gold ${rec.notes ? `- ${rec.notes}` : ''}</td>
                <td>${rec.weight}${unitLabel.innerText}</td>
                <td>${rec.purity}%</td>
                <td style="text-align:right;">$${price.toFixed(2)}</td>
            </tr>`;
        });

        document.getElementById('totalW').innerText = tW.toFixed(2);
        document.getElementById('totalC').innerText = `$${tC.toFixed(2)}`;
        document.getElementById('pTotalPrint').innerText = `$${tC.toFixed(2)}`;
        localStorage.setItem('goldState_stable', JSON.stringify(records));
        syncHeader();
    }

    function addNew() {
        const w = parseFloat(document.getElementById('qWeight').value);
        const p = parseFloat(document.getElementById('qPurity').value);
        const k = document.getElementById('qKarat').value;
        if(!w) return;
        records.push({ id: Date.now(), weight: w, purity: p, karat: k==='custom'?'Custom':k+'K', img: null, isEditing: false, notes: '' });
        document.getElementById('qWeight').value = '';
        recalc();
    }

    function resetApp() { if(confirm("Clear current transaction?")) { records = []; recalc(); } }

    window.onload = () => {
        document.getElementById('docDate').valueAsDate = new Date();
        const saved = localStorage.getItem('goldState_stable');
        if(saved) records = JSON.parse(saved);
        fetchSpot();
    };
</script>
</body>
</html>
