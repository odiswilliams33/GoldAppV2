<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gold Tracker Pro - Executive Edition</title>
    <style>
        :root {
            --primary: #1e293b; 
            --bg: #0f172a;      
            --card: #ffffff;
            --border: #e2e8f0;
            --danger: #ef4444;
            --accent-gold: #eab308; 
            --dark-badge: #334155;
            --price-gold: #854d0e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; border-radius: 0 !important; }
        body { background: var(--bg); padding: 10px; padding-bottom: 60px; }
        .container { max-width: 700px; margin: 0 auto; background: var(--card); border-radius: 20px !important; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

        /* PRINT STYLES */
        #printHeader { display: none; }
        @media print {
            .quick-add, .btn-action, #bulkBar, details, .checkbox-ui, .edit-drawer, .header, .btn-photo, #recordsList { display: none !important; }
            #printHeader { display: block; }
            .container { box-shadow: none; padding: 0; max-width: 100%; border-radius: 0 !important; }
            body { background: white; padding: 0; }
            .receipt-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
            .receipt-table th { background: #f8fafc; border-bottom: 2px solid #000; text-align: left; padding: 10px; font-size: 0.7rem; text-transform: uppercase; }
            .receipt-table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.8rem; vertical-align: middle; }
            .sig-section { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; margin-top: 60px; }
            .sig-box { border-top: 1px solid #000; padding-top: 8px; font-size: 0.75rem; font-weight: bold; text-align: center; }
            .meta-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 15px; background: #f9fafb; padding: 10px; border-radius: 8px !important; border: 1px solid #eee; }
            .meta-item label { font-size: 0.6rem; color: #64748b; display: block; font-weight: 800; }
            .meta-item span { font-size: 0.9rem; font-weight: 700; }
        }

        .header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 3px solid var(--accent-gold); padding-bottom: 10px; align-items: center; }
        .header h2 { color: var(--primary); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
        .spot-badge { background: var(--primary); color: var(--accent-gold); padding: 6px 14px; border-radius: 50px !important; font-weight: 800; font-size: 0.75rem; cursor: pointer; border: 1px solid var(--accent-gold); }
        
        .totals-banner { background: var(--primary); color: white; padding: 18px; border-radius: 12px !important; display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 5px solid var(--accent-gold); align-items: center; }
        .total-val { font-size: 1.6rem; font-weight: 900; color: var(--accent-gold); font-family: ui-monospace, monospace; }

        /* THE FIX: Hard-capping the widths */
        .date-name-row { 
            display: flex; 
            gap: 12px; 
            margin-top: 10px; 
            width: 100%;
        }
        .date-group { width: 140px; flex-shrink: 0; }
        .name-group { flex-grow: 1; min-width: 0; }

        .grid-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        
        label { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; }
        input, select, textarea { padding: 12px; border: 1px solid var(--border); border-radius: 8px !important; font-size: 1rem; width: 100%; font-weight: 600; outline: none; }
        input:focus { border-color: var(--accent-gold); }
        input:disabled { background: #f8fafc; color: #94a3b8; }
        
        .quick-add { background: #f1f5f9; padding: 15px; border-radius: 12px !important; display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 20px; border: 1px solid var(--border); align-items: end; }
        .btn-add { background: var(--primary); color: var(--accent-gold); border: 2px solid var(--accent-gold); padding: 12px; border-radius: 8px !important; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }

        .item-card { border: 1px solid var(--border); border-radius: 15px !important; padding: 15px; margin-bottom: 12px; background: white; }
        .item-card.editing { border: 2px solid var(--accent-gold); }
        .card-view { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card-left { display: flex; align-items: center; gap: 12px; }
        
        .karat-badge { background: var(--primary); color: var(--accent-gold); padding: 6px 10px; border-radius: 6px !important; font-size: 0.8rem; font-weight: 800; min-width: 45px; text-align: center; border: 1px solid var(--accent-gold); }
        .item-text { font-size: 1.1rem; font-weight: 800; color: var(--primary); }
        .item-price { color: var(--price-gold); font-size: 1.2rem; font-weight: 900; font-family: monospace; }
        
        .edit-drawer { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .item-card.editing .edit-drawer { display: block; }
        .btn-action { width: 100%; padding: 15px; border-radius: 12px !important; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        #bulkBar { display: none; justify-content: space-between; align-items: center; background: #fee2e2; padding: 12px; border-radius: 12px !important; margin-bottom: 15px; border: 1px solid #fecaca; }
    </style>
</head>
<body>

<div class="container">
    <div id="printHeader">
        <div style="display: flex; justify-content: space-between; border-bottom: 3px solid #000; padding-bottom: 15px;">
            <div><h1>GOLD PURCHASE RECEIPT</h1><p>Date: <span id="pDate"></span></p></div>
            <div style="text-align: right;"><h3 id="pBuyer">Your Business</h3></div>
        </div>
        <div class="meta-grid">
            <div class="meta-item"><label>Seller</label><span id="pSeller"></span></div>
            <div class="meta-item"><label>Spot</label><span id="pSpotVal"></span></div>
            <div class="meta-item"><label>Unit</label><span id="pUnitVal"></span></div>
        </div>
        <table style="width:100%; border-collapse:collapse; margin-top:20px;">
            <thead><tr><th style="text-align:left">Description</th><th style="text-align:right">Price</th></tr></thead>
            <tbody id="pItemsBody"></tbody>
        </table>
    </div>

    <div class="header">
        <h2>Gold Tracker <span style="color:var(--accent-gold)">Pro</span></h2>
        <div class="spot-badge" id="livePrice" onclick="fetchSpot()">Spot: $...</div>
    </div>

    <details open>
        <summary style="cursor:pointer; font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase;">Transaction Details</summary>
        <div class="date-name-row">
            <div class="input-group date-group"><label>Date</label><input type="date" id="docDate" oninput="syncHeader()"></div>
            <div class="input-group name-group"><label>Seller Name</label><input type="text" id="seller" placeholder="Customer Name" oninput="syncHeader()"></div>
        </div>
        <div class="grid-settings">
            <div class="input-group"><label>Spot Price</label><input type="number" id="spotPrice" oninput="recalc()"></div>
            <div class="input-group"><label>% of Spot</label><input type="number" id="percent" value="90" oninput="recalc()"></div>
            <div class="input-group"><label>Unit</label>
                <select id="unit" onchange="recalc()">
                    <option value="grams">Grams</option>
                    <option value="dwt">Dwt</option>
                    <option value="ozt">Ozt</option>
                </select>
            </div>
            <div class="input-group"><label>Buyer</label><input type="text" id="buyer" placeholder="Store Name" oninput="syncHeader()"></div>
        </div>
    </details>

    <div class="totals-banner">
        <div><p style="font-size:0.65rem; opacity:0.8;">TOTAL WEIGHT</p><span id="totalW">0.00</span> <span id="uLabel">g</span></div>
        <div id="totalC" class="total-val">$0.00</div>
    </div>

    <div class="quick-add">
        <div class="input-group"><label>Weight</label><input type="number" id="qWeight" placeholder="0.00"></div>
        <div class="input-group">
            <label>Karat</label>
            <select id="qKarat" onchange="syncPurity()">
                <option value="10" selected>10K</option><option value="14">14K</option><option value="18">18K</option><option value="24">24K</option>
            </select>
        </div>
        <div class="input-group"><label>Purity %</label><input type="number" id="qPurity" value="41.67" disabled></div>
        <button class="btn-add" onclick="addNew()">Add</button>
    </div>

    <div id="recordsList"></div>

    <button class="btn-action" style="background:var(--primary); color:var(--accent-gold);" onclick="window.print()">🖨️ Print Receipt</button>
</div>

<script>
    let records = [];
    const karatMap = { 10: 41.67, 14: 58.33, 18: 75.0, 24: 99.99 };

    function syncPurity() {
        const k = document.getElementById('qKarat').value;
        document.getElementById('qPurity').value = karatMap[k];
    }

    function syncHeader() {
        document.getElementById('pDate').innerText = document.getElementById('docDate').value;
        document.getElementById('pSeller').innerText = document.getElementById('seller').value || 'N/A';
        document.getElementById('pSpotVal').innerText = `$${document.getElementById('spotPrice').value}`;
    }

    async function fetchSpot() {
        try {
            const r = await fetch('https://api.metals.dev/v1/latest?api_key=SDLIO6XALG4MJ66HNTWF1196HNTWF&currency=USD&unit=toz');
            const d = await r.json();
            document.getElementById('livePrice').innerText = `Spot: $${d.metals.gold.toFixed(2)}`;
            document.getElementById('spotPrice').value = d.metals.gold.toFixed(2);
            recalc();
        } catch(e) { document.getElementById('livePrice').innerText = "Offline"; }
    }

    function addNew() {
        const w = parseFloat(document.getElementById('qWeight').value);
        if(!w) return;
        records.push({ id: Date.now(), weight: w, purity: parseFloat(document.getElementById('qPurity').value), karat: document.getElementById('qKarat').value + 'K' });
        document.getElementById('qWeight').value = '';
        recalc();
    }

    function recalc() {
        const spot = parseFloat(document.getElementById('spotPrice').value) || 0;
        const pct = parseFloat(document.getElementById('percent').value) / 100 || 0;
        const unit = document.getElementById('unit').value;
        const list = document.getElementById('recordsList');
        list.innerHTML = '';
        let tW = 0, tC = 0;

        records.forEach(rec => {
            let conv = unit === 'grams' ? 31.1035 : (unit === 'dwt' ? 20 : 1);
            let price = (rec.weight / conv) * (rec.purity / 100) * spot * pct;
            tW += rec.weight; tC += price;
            list.innerHTML += `
                <div class="item-card">
                    <div class="card-view">
                        <div class="card-left"><div class="karat-badge">${rec.karat}</div><span>${rec.weight} ${unit[0]}</span></div>
                        <div class="item-price">$${price.toFixed(2)}</div>
                    </div>
                </div>`;
        });

        document.getElementById('totalW').innerText = tW.toFixed(2);
        document.getElementById('totalC').innerText = `$${tC.toFixed(2)}`;
    }

    window.onload = () => {
        document.getElementById('docDate').valueAsDate = new Date();
        fetchSpot();
    };
</script>
</body>
</html>
