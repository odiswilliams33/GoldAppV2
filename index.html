<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gold Tracker Pro - Executive Edition</title>
    <style>
        :root {
            --primary: #1e293b; 
            --bg: #0f172a;      
            --card: #ffffff;
            --border: #e2e8f0;
            --danger: #ef4444;
            --accent-gold: #eab308; 
            --dark-badge: #334155;
            --price-gold: #854d0e;
            --warning-yellow: #fefce8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; border-radius: 0 !important; }
        body { background: var(--bg); padding: 10px; padding-bottom: 60px; }
        .container { max-width: 700px; margin: 0 auto; background: var(--card); border-radius: 20px !important; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

        /* PRINT STYLES */
        #printHeader { display: none; }
        @media print {
            .quick-add, .btn-action, #bulkBar, details, .checkbox-ui, .edit-drawer, .header, .btn-photo, #recordsList { display: none !important; }
            #printHeader { display: block; }
            .container { box-shadow: none; padding: 0; max-width: 100%; border-radius: 0 !important; }
            body { background: white; padding: 0; }
            .receipt-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
            .receipt-table th { background: #f8fafc; border-bottom: 2px solid #000; text-align: left; padding: 10px; font-size: 0.7rem; text-transform: uppercase; }
            .receipt-table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.8rem; vertical-align: middle; }
            .receipt-img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px !important; border: 1px solid #eee; }
            .sig-section { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; margin-top: 60px; }
            .sig-box { border-top: 1px solid #000; padding-top: 8px; font-size: 0.75rem; font-weight: bold; text-align: center; }
            .meta-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 15px; background: #f9fafb; padding: 10px; border-radius: 8px !important; border: 1px solid #eee; }
            .meta-item label { font-size: 0.6rem; color: #64748b; display: block; font-weight: 800; }
            .meta-item span { font-size: 0.9rem; font-weight: 700; }
        }

        .header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 3px solid var(--accent-gold); padding-bottom: 10px; align-items: center; }
        .header h2 { color: var(--primary); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
        .spot-badge { background: var(--primary); color: var(--accent-gold); padding: 6px 14px; border-radius: 50px !important; font-weight: 800; font-size: 0.75rem; cursor: pointer; border: 1px solid var(--accent-gold); }
        
        .totals-banner { background: var(--primary); color: white; padding: 18px; border-radius: 12px !important; display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 5px solid var(--accent-gold); }
        .total-val { font-size: 1.6rem; font-weight: 900; color: var(--accent-gold); font-family: ui-monospace, monospace; }

        /* GRID SETTINGS */
        .grid-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        
        /* SPECIFIC ROW OVERRIDE FOR DATE & NAME */
        .date-name-row { grid-template-columns: 130px 1fr !important; }

        .input-group { display: flex; flex-direction: column; gap: 4px; }
        
        label { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; }
        input, select, textarea { padding: 12px; border: 1px solid var(--border); border-radius: 8px !important; font-size: 1rem; width: 100%; font-weight: 600; outline: none; }
        input:focus { border-color: var(--accent-gold); }
        input:disabled { background: #f8fafc; color: #94a3b8; cursor: not-allowed; }
        
        .quick-add { background: #f1f5f9; padding: 15px; border-radius: 12px !important; display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 20px; border: 1px solid var(--border); align-items: end; }
        .btn-add { background: var(--primary); color: var(--accent-gold); border: 2px solid var(--accent-gold); padding: 12px; border-radius: 8px !important; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }

        .item-card { border: 1px solid var(--border); border-radius: 15px !important; padding: 15px; margin-bottom: 12px; background: white; transition: all 0.2s; }
        .item-card.editing { border: 2px solid var(--accent-gold); box-shadow: 0 4px 12px rgba(234, 179, 8, 0.1); }
        .card-view { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card-left { display: flex; align-items: center; gap: 12px; }
        
        .karat-badge { background: var(--primary); color: var(--accent-gold); padding: 6px 10px; border-radius: 6px !important; font-size: 0.8rem; font-weight: 800; min-width: 45px; text-align: center; border: 1px solid var(--accent-gold); }
        .item-text { font-size: 1.1rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .item-price { color: var(--price-gold); font-size: 1.2rem; font-weight: 900; font-family: monospace; }
        
        .thumb-preview { width: 45px; height: 45px; border-radius: 6px !important; object-fit: cover; background: #f1f5f9; border: 1px solid var(--border); }
        .checkbox-ui { width: 22px; height: 22px; cursor: pointer; accent-color: var(--accent-gold); }

        .edit-drawer { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .item-card.editing .edit-drawer { display: block; }
        .btn-photo { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px !important; font-size: 0.75rem; font-weight: 700; cursor: pointer; border-bottom: 2px solid var(--accent-gold); }
        .btn-action { width: 100%; padding: 15px; border-radius: 12px !important; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        #bulkBar { display: none; justify-content: space-between; align-items: center; background: #fee2e2; padding: 12px; border-radius: 12px !important; margin-bottom: 15px; border: 1px solid #fecaca; }
    </style>
</head>
<body>

<div class="container">
    <div id="printHeader">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid #000; padding-bottom: 15px;">
            <div>
                <h1 style="font-size: 1.8rem; letter-spacing: -1px;">GOLD PURCHASE RECEIPT</h1>
                <p style="font-weight: 600;">Date: <span id="pDate"></span></p>
            </div>
            <div style="text-align: right;">
                <h3 id="pBuyer">Your Business Name</h3>
                <p style="font-size: 0.7rem; color: #64748b;">Licensed Precious Metals Dealer</p>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-top: 15px;">
            <div><label>Seller Name</label><p id="pSeller" style="font-size: 1.1rem; font-weight: 700; border-bottom: 1px solid #eee;"></p></div>
            <div class="meta-grid">
                <div class="meta-item"><label>Spot Price</label><span id="pSpotVal">--</span></div>
                <div class="meta-item"><label>Payout %</label><span id="pPctVal">--</span></div>
                <div class="meta-item"><label>Unit Type</label><span id="pUnitVal">--</span></div>
            </div>
        </div>
        <table class="receipt-table">
            <thead><tr><th>Photo</th><th>Item Description</th><th>Weight</th><th>Purity</th><th style="text-align: right;">Amount</th></tr></thead>
            <tbody id="pItemsBody"></tbody>
            <tfoot><tr><td colspan="4" style="text-align: right; font-weight: 800; padding-top: 15px;">TOTAL SETTLEMENT:</td><td id="pTotalPrint" style="text-align: right; font-weight: 900; font-size: 1.3rem; padding-top: 15px;"></td></tr></tfoot>
        </table>
        <div class="sig-section"><div class="sig-box">SELLER SIGNATURE</div><div class="sig-box">BUYER/AGENT SIGNATURE</div></div>
    </div>

    <div class="header">
        <h2>Gold Tracker <span style="color:var(--accent-gold)">Pro</span></h2>
        <div class="spot-badge" id="livePrice" onclick="fetchSpot()">Spot: $...</div>
    </div>

    <details style="margin-bottom: 15px;">
        <summary style="cursor:pointer; font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase;">Transaction Details</summary>
        <!-- ADJUSTED ROW FOR DATE AND NAME -->
        <div class="grid-settings date-name-row">
            <div class="input-group"><label>Date</label><input type="date" id="docDate" oninput="syncHeader()"></div>
            <div class="input-group"><label>Seller Name</label><input type="text" id="seller" placeholder="Customer Name" oninput="syncHeader()"></div>
        </div>
        <div class="grid-settings">
            <div class="input-group"><label>Spot Price</label><input type="number" id="spotPrice" oninput="recalc()"></div>
            <div class="input-group"><label>% of Spot</label><input type="number" id="percent" value="90" oninput="recalc()"></div>
            <div class="input-group"><label>Unit</label>
                <select id="unit" onchange="recalc()">
                    <option value="grams">Grams</option>
                    <option value="dwt">Dwt</option>
                    <option value="ozt">Ozt (Troy)</option>
                </select>
            </div>
            <div class="input-group"><label>Buyer</label><input type="text" id="buyer" placeholder="Store/Buyer" oninput="syncHeader()"></div>
        </div>
    </details>

    <div class="totals-banner">
        <div style="font-weight: 800;">
            <p style="font-size: 0.65rem; opacity: 0.8; letter-spacing: 1px;">TOTAL WEIGHT</p>
            <span id="totalW" style="font-size: 1.4rem;">0.00</span> <span id="uLabel">g</span>
        </div>
        <div id="totalC" class="total-val">$0.00</div>
    </div>

    <div class="quick-add">
        <div class="input-group"><label>Weight</label><input type="number" id="qWeight" placeholder="0.00"></div>
        <div class="input-group">
            <label>Karat</label>
            <select id="qKarat" onchange="syncPurity('qKarat', 'qPurity')">
                <option value="8">8K</option><option value="9">9K</option><option value="10" selected>10K</option><option value="12">12K</option><option value="14">14K</option><option value="18">18K</option><option value="22">22K</option><option value="24">24K</option><option value="custom">Custom</option>
            </select>
        </div>
        <div class="input-group"><label>Purity %</label><input type="number" id="qPurity" value="41.67" step="0.01" disabled></div>
        <button class="btn-add" onclick="addNew()">Add</button>
    </div>

    <div id="bulkBar">
        <span id="bulkCount" style="font-weight: 800; color: var(--danger);">0 Selected</span>
        <button style="background: var(--danger); color: white; border:none; padding: 5px 10px; border-radius: 5px !important; font-weight:700;" onclick="deleteSelected()">Delete Selected</button>
    </div>

    <div id="recordsList"></div>

    <button class="btn-action" style="background:var(--primary); color:var(--accent-gold); border: 1px solid var(--accent-gold);" onclick="window.print()">🖨️ Print Receipt</button>
    <button class="btn-action" style="background:#f1f5f9; color:var(--danger); border: 1px solid #cbd5e1;" onclick="resetApp()">🔄 Clear Session</button>
</div>

<script>
    let records = [];
    const karatMap = { 8: 33.33, 9: 37.50, 10: 41.67, 12: 50.00, 14: 58.33, 18: 75.0, 22: 91.67, 24: 99.99 };

    function syncPurity(kId, pId) {
        const kSelect = document.getElementById(kId);
        const pInput = document.getElementById(pId);
        if(kSelect.value !== 'custom') {
            pInput.value = karatMap[kSelect.value];
            pInput.disabled = true;
        } else {
            pInput.disabled = false;
        }
    }

    function syncHeader() {
        document.getElementById('pDate').innerText = document.getElementById('docDate').value;
        document.getElementById('pSeller').innerText = document.getElementById('seller').value || 'N/A';
        document.getElementById('pBuyer').innerText = document.getElementById('buyer').value || 'Store/Dealer';
        document.getElementById('pSpotVal').innerText = `$${document.getElementById('spotPrice').value || '0'}`;
        document.getElementById('pPctVal').innerText = `${document.getElementById('percent').value || '0'}%`;
        document.getElementById('pUnitVal').innerText = document.getElementById('unit').options[document.getElementById('unit').selectedIndex].text;
    }

    async function fetchSpot() {
        const badge = document.getElementById('livePrice');
        badge.innerText = "Sync...";
        try {
            const r = await fetch('https://api.metals.dev/v1/latest?api_key=SDLIO6XALG4MJ66HNTWF1196HNTWF&currency=USD&unit=toz');
            const d = await r.json();
            const val = d.metals.gold;
            badge.innerText = `Spot: $${val.toFixed(2)}`;
            document.getElementById('spotPrice').value = val.toFixed(2);
            recalc();
        } catch(e) { badge.innerText = "Offline"; }
    }

    function addNew() {
        const w = parseFloat(document.getElementById('qWeight').value);
        const p = parseFloat(document.getElementById('qPurity').value);
        const k = document.getElementById('qKarat').value;
        if(!w || !p) return;
        records.push({ id: Date.now(), weight: w, purity: p, karat: k==='custom'?'Custom':k+'K', notes: '', img: null, selected: false, isEditing: false });
        document.getElementById('qWeight').value = '';
        recalc();
    }

    function updateRecSilent(id, field, value) {
        const rec = records.find(r => r.id === id);
        if(field === 'karat') {
            if(value !== 'custom') {
                rec.karat = value + 'K';
                rec.purity = karatMap[value];
                const pInput = document.getElementById(`purity-${id}`);
                if(pInput) { pInput.value = rec.purity; pInput.disabled = true; }
            } else {
                rec.karat = 'Custom';
                const pInput = document.getElementById(`purity-${id}`);
                if(pInput) pInput.disabled = false;
            }
            recalc();
        } else {
            rec[field] = (field === 'notes' || field === 'selected') ? value : parseFloat(value);
            updateTotalsOnly();
        }
    }

    function updateTotalsOnly() {
        const spot = parseFloat(document.getElementById('spotPrice').value) || 0;
        const pct = parseFloat(document.getElementById('percent').value) / 100 || 0;
        const unit = document.getElementById('unit').value;
        document.getElementById('qWeight').style.backgroundColor = (unit !== 'grams') ? 'var(--warning-yellow)' : 'white';
        let tW = 0, tC = 0;
        const printBody = document.getElementById('pItemsBody');
        printBody.innerHTML = '';

        records.forEach(rec => {
            let conv = unit === 'grams' ? 31.1035 : (unit === 'dwt' ? 20 : 1);
            let price = (rec.weight / conv) * (rec.purity / 100) * spot * pct;
            tW += rec.weight; tC += price;
            const priceEl = document.getElementById(`price-${rec.id}`);
            if(priceEl) priceEl.innerText = `$${price.toFixed(2)}`;
            const textEl = document.getElementById(`text-${rec.id}`);
            if(textEl) textEl.innerText = `${rec.weight}${unit === 'ozt' ? 'oz' : unit[0]} - ${rec.purity}%`;
            printBody.innerHTML += `<tr>
                <td>${rec.img ? `<img src="${rec.img}" class="receipt-img">` : '<div style="font-size:0.5rem; color:#ccc;">NO PHOTO</div>'}</td>
                <td>${rec.karat} Gold ${rec.notes ? `<br><small>(${rec.notes})</small>` : ''}</td>
                <td>${rec.weight}${unit === 'grams' ? 'g' : (unit === 'dwt' ? 'dwt' : 'ozt')}</td>
                <td>${rec.purity}%</td>
                <td style="text-align:right;">$${price.toFixed(2)}</td></tr>`;
        });

        document.getElementById('totalW').innerText = tW.toFixed(2);
        document.getElementById('uLabel').innerText = unit === 'ozt' ? 'ozt' : (unit === 'dwt' ? 'dwt' : 'g');
        document.getElementById('totalC').innerText = `$${tC.toFixed(2)}`;
        document.getElementById('pTotalPrint').innerText = `$${tC.toFixed(2)}`;
        localStorage.setItem('goldState_stable_dark', JSON.stringify(records));
        syncHeader();
    }

    function handleImage(id, input) {
        const reader = new FileReader();
        reader.onload = (e) => { records.find(r => r.id === id).img = e.target.result; recalc(); };
        if(input.files[0]) reader.readAsDataURL(input.files[0]);
    }

    function deleteSelected() { if(confirm("Delete selected items?")) { records = records.filter(r => !r.selected); recalc(); } }
    function toggleEdit(id) { records.forEach(r => r.isEditing = (r.id === id ? !r.isEditing : false)); recalc(); }

    function recalc() {
        const unit = document.getElementById('unit').value;
        const list = document.getElementById('recordsList');
        list.innerHTML = '';
        let selCount = 0;
        records.forEach(rec => {
            if(rec.selected) selCount++;
            const isCustom = rec.karat === 'Custom';
            const karatVal = isCustom ? 'custom' : rec.karat.replace('K','');
            const div = document.createElement('div');
            div.className = `item-card ${rec.isEditing ? 'editing' : ''}`;
            div.innerHTML = `
                <div class="card-view" onclick="toggleEdit(${rec.id})">
                    <div class="card-left">
                        <input type="checkbox" class="checkbox-ui" ${rec.selected ? 'checked' : ''} onclick="event.stopPropagation(); updateRecSilent(${rec.id}, 'selected', this.checked); recalc();">
                        <div class="karat-badge">${rec.karat}</div>
                        ${rec.img ? `<img src="${rec.img}" class="thumb-preview">` : ''}
                        <span class="item-text" id="text-${rec.id}">${rec.weight}${unit === 'ozt' ? 'oz' : unit[0]} - ${rec.purity}%</span>
                    </div>
                    <div class="item-price" id="price-${rec.id}">$0.00</div>
                </div>
                <div class="edit-drawer" onclick="event.stopPropagation()">
                    <div class="grid-settings">
                        <div class="input-group"><label>Weight</label><input type="number" step="0.01" value="${rec.weight}" oninput="updateRecSilent(${rec.id}, 'weight', this.value)"></div>
                        <div class="input-group">
                            <label>Karat</label>
                            <select onchange="updateRecSilent(${rec.id}, 'karat', this.value)">
                                ${Object.keys(karatMap).map(k => `<option value="${k}" ${karatVal===k?'selected':''}>${k}K</option>`).join('')}
                                <option value="custom" ${isCustom?'selected':''}>Custom</option>
                            </select>
                        </div>
                        <div class="input-group"><label>Purity %</label><input type="number" id="purity-${rec.id}" step="0.01" value="${rec.purity}" ${!isCustom?'disabled':''} oninput="updateRecSilent(${rec.id}, 'purity', this.value)"></div>
                        <div class="input-group"><label>Photo</label><button class="btn-photo" onclick="document.getElementById('img-${rec.id}').click()">Photo</button></div>
                    </div>
                    <input type="file" id="img-${rec.id}" style="display:none" accept="image/*" onchange="handleImage(${rec.id}, this)">
                    <textarea style="margin-top:10px" placeholder="Item Notes..." oninput="updateRecSilent(${rec.id}, 'notes', this.value)">${rec.notes}</textarea>
                </div>`;
            list.appendChild(div);
        });
        updateTotalsOnly();
        const bulk = document.getElementById('bulkBar');
        bulk.style.display = selCount > 0 ? 'flex' : 'none';
        document.getElementById('bulkCount').innerText = `${selCount} Selected`;
    }

    function resetApp() { if(confirm("Clear everything?")) { records = []; localStorage.removeItem('goldState_stable_dark'); recalc(); } }

    window.onload = () => {
        document.getElementById('docDate').valueAsDate = new Date();
        const saved = localStorage.getItem('goldState_stable_dark');
        if(saved) records = JSON.parse(saved);
        fetchSpot();
    };
</script>
</body>
</html>
